[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
rootstock_testnet = "${ROOTSTOCK_TESTNET_RPC}"
rootstock_mainnet = "${ROOTSTOCK_MAINNET_RPC}"

[etherscan]
rootstock_testnet = { key = "rootstock", chain = 31, url = "https://rootstock-testnet.blockscout.com/api/" }
rootstock_mainnet = { key = "rootstock", chain = 30, url = "https://rootstock.blockscout.com/api/" }
